version: "3.8"

services:
  api:
    build: .
    ports:
      - "8011:8011"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=breach_user
      - POSTGRES_PASSWORD=breach_password
      - POSTGRES_DB=breach_intelligence
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - HIBP_API_KEY=${HIBP_API_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - HIBP_API_KEY=${HIBP_API_KEY:-}
    depends_on:
      - api
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=breach_user
      - POSTGRES_PASSWORD=breach_password
      - POSTGRES_DB=breach_intelligence
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U breach_user -d breach_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
